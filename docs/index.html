<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>National Tech Exhibition</title>
  <meta http-equiv="X-UA-Compatible" content="IE=edge,chrome=1" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, minimum-scale=1.0">
  <link rel="stylesheet" href="//cdn.jsdelivr.net/npm/docsify@4/lib/themes/vue.css">
  <style>
    /* Simple Carousel Styles */
    .carousel { position: relative; width: 100%; max-width: 800px; margin: auto; overflow: hidden; }
    .slides { display: flex; transition: transform 0.5s ease-in-out; }
    .slide { min-width: 100%; box-sizing: border-box; }
    .slide img { width: 100%; height: auto; display: block; }
    .carousel-btn { position: absolute; top: 50%; transform: translateY(-50%); background: rgba(0,0,0,0.5); color: white; border: none; padding: 10px 15px; cursor: pointer; font-size: 18px; z-index: 10;}
    .prev-btn { left: 10px; }
    .next-btn { right: 10px; }
  </style>
</head>
<body>
  <div id="app"></div>
  <script>
  window.$docsify = {
    name: 'Jubilejní výstava',
    repo: '',
    loadNavbar: true,
    loadSidebar: true, // <-- Adds the global sidebar
    subMaxLevel: 2,    // <-- Optional: shows sub-headings (H2) under your page links
    executeScript: true,
    
    // Upgraded Search Config
    search: {
      paths: 'auto', // 'auto' tells the search to crawl all links in your sidebar
      placeholder: 'Hledej dokument...',
      noData: 'Žádný výsledek.',
      depth: 3 // How deep into headers the search should look
    },

    // Your image-resizer plugin from earlier goes here...
    plugins: [
      function(hook, vm) {
        hook.doneEach(function() {
          if (typeof imageMapResize === 'function') {
            imageMapResize('map');
          }
        });
      }
    ]
  }
</script>
  <script src="//cdn.jsdelivr.net/npm/docsify@4"></script>
  <script src="//cdn.jsdelivr.net/npm/docsify/lib/plugins/search.min.js"></script>

  <script>
    function moveSlide(direction) {
      const slides = document.querySelector('.slides');
      if (!slides) return;
      // Simple toggle since we only have 2 plans
      const currentTransform = slides.style.transform;
      if (currentTransform === 'translateX(-100%)') {
        slides.style.transform = 'translateX(0%)';
      } else {
        slides.style.transform = 'translateX(-100%)';
      }
    }
  </script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/image-map-resizer/1.0.10/js/imageMapResizer.min.js"></script>
</body>
</html>
